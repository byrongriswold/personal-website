<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script defer src="script.js"></script>
  </head>
  <header>
    <nav class="navbar navbar-expand-md custom-navbar">
      <div class="container-fluid mx-2 my-2 mx-md-4">
        <a class="navbar-brand" href="index.html">BYRON GRISWOLD</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto gap-md-3">
            <li class="nav-item">
              <a class="nav-link nav-text-link" href="index.html#about"
                >About</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link nav-text-link" href="index.html#skills"
                >Skills</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link nav-text-link" href="index.html#projects"
                >Projects</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link btn nav-link-btn" href="#">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <body>
    <main>
      <section class="contact-section">
        <h1>Contact</h1>
        <h4>Send a message.</h4>
        <form method="post" action="/submitform">
          <div class="form-group name-group">
            <label for="name" class="form-label">Name</label>
            <input
              type="text"
              class="form-control"
              id="name"
              name="name"
              placeholder="Your Name"
            />
          </div>
          <div class="form-group email-group">
            <label for="email" class="form-label">Email</label>
            <input
              type="text"
              class="form-control"
              id="email"
              name="email"
              placeholder="name@example.com"
            />
          </div>
          <div class="form-group message-group">
            <label for="message" class="form-label">Message</label>
            <textarea
              class="form-control"
              id="message"
              name="message"
              rows="8"
            ></textarea>
          </div>
          <button class="btn form-btn">Send</button>
        </form>
      </section>
      <div class="submit-success">
        <h2 class="success-heading">
          <span class="check"><i class="bi bi-check-lg"></i></span>
          Message Sent!
        </h2>
        <p>Thanks for reaching out. I will get back to you as soon as I can.</p>
      </div>
    </main>
    <footer>
      <p>&copy; 2026 Byron Griswold</p>
    </footer>
  </body>
</html>
